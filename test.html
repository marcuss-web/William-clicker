<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Login Test</h1>
    
    <input type="text" id="name" placeholder="Brugernavn">
    <input type="password" id="pass" placeholder="Password">
    <button id="registerBtn">OPRET KONTO</button>
    <button id="loginBtn">LOGIN</button>
    <button id="checkUsersBtn">SE ALLE BRUGERE</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

    <script>
        const SUPABASE_URL = 'https://twuwlostiswxtivutyvd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Fhc4uhNVDEbR-4zQlD_mGg_irCRpGC9';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const resultDiv = document.getElementById('result');
        
        function showResult(text, isError = false) {
            resultDiv.innerHTML = text;
            resultDiv.style.color = isError ? 'red' : 'green';
        }
        
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const pass = document.getElementById('pass').value;
            
            if (!name || !pass) {
                showResult('Udfyld alle felter!', true);
                return;
            }
            
            showResult('Opretter...');
            
            const { data, error } = await supabase
                .from('users')
                .insert([{ name: name, password: pass, avatar: '🦊' }])
                .select();
            
            if (error) {
                showResult('FEJL ved oprettelse: ' + JSON.stringify(error, null, 2), true);
            } else {
                showResult('SUCCES! Oprettet: ' + JSON.stringify(data, null, 2));
            }
        });
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const pass = document.getElementById('pass').value;
            
            if (!name || !pass) {
                showResult('Udfyld alle felter!', true);
                return;
            }
            
            showResult('Logger ind...');
            
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('name', name)
                .eq('password', pass)
                .single();
            
            if (error) {
                showResult('FEJL ved login: ' + JSON.stringify(error, null, 2), true);
            } else if (data) {
                showResult('SUCCES! Logget ind som: ' + JSON.stringify(data, null, 2));
            } else {
                showResult('Forkert brugernavn eller password!', true);
            }
        });
        
        document.getElementById('checkUsersBtn').addEventListener('click', async () => {
            showResult('Henter brugere...');
            
            const { data, error } = await supabase
                .from('users')
                .select('*');
            
            if (error) {
                showResult('FEJL: ' + JSON.stringify(error, null, 2), true);
            } else {
                showResult('Brugere i databasen: ' + JSON.stringify(data, null, 2));
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>William Clicker ✨ Aksel the Goat</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e2a2e, #0f1a1f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Hovedcontainer */
        .game-wrapper {
            max-width: 700px;
            width: 100%;
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 85px;
            padding: 20px 24px 40px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        /* Score panel */
        .score-panel {
            background: #03050ce6;
            border-radius: 100px;
            padding: 12px 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: inset 0 1px 4px #00000055, 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid #f3b33d88;
        }

        .score-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffdf9c;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffdd99, #ffaa33);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
            margin: 5px 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Klik-område med William + mund-animation */
        .click-area {
            display: flex;
            justify-content: center;
            margin: 15px 0 15px;
            cursor: pointer;
            transition: transform 0.05s linear;
            position: relative;
        }
        .click-area:active {
            transform: scale(0.97);
        }

        /* Billede-container til mund-effekt */
        .william-container {
            position: relative;
            display: inline-block;
        }

        .william-base {
            width: 260px;
            height: 260px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.6), 0 0 0 6px #f9b23f, 0 0 0 12px #d95b00;
            transition: filter 0.05s, box-shadow 0.1s;
            background: #2a2e40;
            display: block;
        }

        /* Mund lag - SVG / tegning over WilliAM */
        .mouth-overlay {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 38px;
            pointer-events: none;
            transition: all 0.07s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 15;
        }

        .mouth-open {
            content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><path fill="%23442211" stroke="%23b97f44" stroke-width="2" d="M20,15 Q50,45 80,15 Q65,30 35,30 Q20,28 20,15Z" /></svg>');
            width: 90px;
            height: 45px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .mouth-closed {
            content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 30"><path fill="%238B5A2B" stroke="%23c28544" stroke-width="2.2" d="M25,18 Q50,8 75,18 Q55,12 45,12 Q30,14 25,18Z" /></svg>');
            width: 85px;
            height: 32px;
            filter: drop-shadow(0 1px 1px black);
        }

        /* Aksel THE GOAT - cirkulerende sprite */
        .goat-runner {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: 5px;
            margin-bottom: 15px;
            height: 70px;
        }

        .goat-orbiting {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 60px;
            animation: orbitGoat 6s linear infinite;
        }

        @keyframes orbitGoat {
            0% { transform: rotate(0deg) translateX(110px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(110px) rotate(-360deg); }
        }

        .goat-img {
            width: 58px;
            height: 58px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffbe4d;
            box-shadow: 0 0 0 2px #a45d2e, 0 8px 14px black;
            background: #f0c674;
            cursor: pointer;
            transition: 0.1s;
        }

        .goat-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2418cc;
            backdrop-filter: blur(4px);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 50px;
            color: #ffdd99;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Stats + upgrades sektion */
        .upgrade-zone {
            background: #0b0e16aa;
            backdrop-filter: blur(8px);
            border-radius: 55px;
            padding: 18px 20px;
            margin-top: 20px;
            border: 1px solid #f3aa4a66;
        }

        .per-click-row {
            display: flex;
            justify-content: space-between;
            background: #00000066;
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffdaa5;
        }

        .dps-info {
            font-size: 1rem;
            background: #211d14;
            padding: 5px 16px;
            border-radius: 40px;
            display: inline-flex;
            gap: 10px;
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .upgrade-card {
            background: linear-gradient(115deg, #262b3f, #191e2f);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #f6b55766;
            transition: 0.1s;
        }

        .upgrade-info {
            flex: 2;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffe1ae;
        }

        .mini-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid gold;
        }

        .upgrade-desc {
            font-size: 0.7rem;
            color: #cfbc8f;
        }

        .upgrade-cost {
            font-weight: bold;
            background: #1a1208;
            padding: 6px 15px;
            border-radius: 50px;
            font-family: monospace;
            font-size: 1.2rem;
            color: #ffcf7a;
            margin-right: 12px;
        }

        button.buy-btn {
            background: #e48f2b;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            color: #201c10;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #784a1a;
            font-family: inherit;
        }
        button.buy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #784a1a;
        }
        button.buy-btn.disabled-btn {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        .reset-area {
            text-align: center;
            margin-top: 18px;
        }
        .reset-btn {
            background: #3e2a24;
            border: none;
            color: #ffbe89;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 15px;
            color: #af9a74;
        }
        @media (max-width: 550px) {
            .william-base { width: 200px; height: 200px; }
            .mouth-overlay { bottom: 20%; width: 60px; }
            .mouth-open, .mouth-closed { transform: scale(0.8); }
            .goat-orbiting { animation: orbitGoat 5s linear infinite; }
            @keyframes orbitGoat {
                0% { transform: rotate(0deg) translateX(85px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="score-panel">
        <div class="score-title">🍪 WILLIAM POINTS</div>
        <div class="score-value" id="scoreDisplay">0</div>
        <div class="per-click-row">
            <span>👆 KRAFT PR. KLIK:</span>
            <span id="clickPowerSpan">1</span>
        </div>
    </div>

    <!-- William klikområde med mund-animation -->
    <div class="click-area" id="williamClicker">
        <div class="william-container">
            <img class="william-base" id="williamImg" src="https://media-prod.aula.dk/profile-pictures/9096069.jpg?response-content-disposition=attachment%3Bfilename%3D%229096069.jpg%22&amp;Expires=1776416400&amp;Signature=dKDS1BMZd7D3xhJurPS2rLfjpqEUYBgPWa67aQKs1xK-wBkPrZ1hW0dYoPRm-phg-6k9w4gihq3x2Dgyp4FVSSnWdtCElHQO8R2CuT1aj0PAk75rLV92RK1UqQ97b1mXK3AhrwV9DDYfDs3PPv11qzR~ghjwWDREwdoECdEdvfriVS6Mz-3zIPXJ9AJLz~2HdgNWBBSETbeaXnJBilDJ~qNkPd0PqDdGbFk057AbRsN6zwSbS0BmgJ9mOQahsWxQ~GqSYOXZatH9rDxGRIuNPgB217fctBKb7FXdM7phOSP9mniLQv9aAV0SOqpqhdD2UbMSL-Pqvxwo~1iX~rn2jg__&amp;Key-Pair-Id=APKAILBPECUQMHIBROXQ" alt="William Noah Hald">
            <div class="mouth-overlay mouth-closed" id="mouthState"></div>
        </div>
    </div>

    <!-- Aksel the goat der går rundt om William (cirkulerende) -->
    <div class="goat-runner" id="goatOrbitZone" style="min-height: 85px;">
        <!-- Dynamisk hvis man har købt Aksel, vises animationen -->
        <div id="goatWrapper" style="display: none;">
            <div class="goat-orbiting">
                <img class="goat-img" id="akselGoatImg" src="https://media-prod.aula.dk/profile-pictures/9155257.jpg?response-content-disposition=attachment%3Bfilename%3D%229155257.jpg%22&amp;Expires=1776416400&amp;Signature=E-g0wFe4oUNEvMmVf3R6BEw6JoyuLwEKv6vhXArP5AMVjvYjpfD5uQVSB~IgCwZg3lv0pK38q4wpzqYITnkErNWDOG7nU3d2Zub3f07VMRFuhjMaRWCRY5oj8Jp2HpYvQWW8SCA~u946n5WU0uxfNHJNiUmHNJXVqtW0AtZ~A94tnZGta9tU35vhAEYdExwTR5sqhT1b2UKrpy1IL8H8clylIlNt0TOaS9ruQdvyH7rJqE9Ju1KNKJYAmrqJesqKzvBvRFL2aSi9Gc67l-4Oo4bKOXjr6F5vRyD-x0~wi1bnweivpavJQuTyO3QkPxWXFvvHpLjK4ElFDDng4RYECg__&amp;Key-Pair-Id=APKAILBPECUQMHIBROXQ" alt="Aksel the goat">
                <div class="goat-label">🐐 Aksel</div>
            </div>
        </div>
    </div>

    <!-- Upgrades sektion -->
    <div class="upgrade-zone">
        <div class="upgrade-list">
            <!-- Upgrade 1: Øg klikstyrke -->
            <div class="upgrade-card" id="upgradeClickCard">
                <div class="upgrade-info">
                    <div class="upgrade-name">💪 Stærkere Klik</div>
                    <div class="upgrade-desc">+1 point per klik (nuværende: <span id="clickLevel">1</span>)</div>
                </div>
                <div class="upgrade-cost" id="clickCostSpan">10</div>
                <button class="buy-btn" id="buyClickBtn">KØB</button>
            </div>

            <!-- Upgrade 2: Aksel the goat - går rundt og giver 1 click/sek -->
            <div class="upgrade-card" id="upgradeGoatCard">
                <div class="upgrade-info">
                    <div class="upgrade-name">
                        <span>🐐 Aksel the GOAT</span>
                        <img class="mini-avatar" src="https://media-prod.aula.dk/profile-pictures/9155257.jpg?response-content-disposition=attachment%3Bfilename%3D%229155257.jpg%22&amp;Expires=1776416400&amp;Signature=E-g0wFe4oUNEvMmVf3R6BEw6JoyuLwEKv6vhXArP5AMVjvYjpfD5uQVSB~IgCwZg3lv0pK38q4wpzqYITnkErNWDOG7nU3d2Zub3f07VMRFuhjMaRWCRY5oj8Jp2HpYvQWW8SCA~u946n5WU0uxfNHJNiUmHNJXVqtW0AtZ~A94tnZGta9tU35vhAEYdExwTR5sqhT1b2UKrpy1IL8H8clylIlNt0TOaS9ruQdvyH7rJqE9Ju1KNKJYAmrqJesqKzvBvRFL2aSi9Gc67l-4Oo4bKOXjr6F5vRyD-x0~wi1bnweivpavJQuTyO3QkPxWXFvvHpLjK4ElFDDng4RYECg__&amp;Key-Pair-Id=APKAILBPECUQMHIBROXQ" alt="aksel">
                    </div>
                    <div class="upgrade-desc">✨ Går rundt om William og giver +1 point hvert sekund</div>
                </div>
                <div class="upgrade-cost" id="goatCostSpan">50</div>
                <button class="buy-btn" id="buyGoatBtn">KØB</button>
            </div>
        </div>
        <div class="reset-area">
            <button class="reset-btn" id="resetBtn">🔄 Nulstil spil</button>
        </div>
    </div>
    <footer>👑 Klik på William → han åbner munden! Køb Aksel for passiv indkomst 🐐</footer>
</div>

<script>
    // ------ SPIL STATUS ------
    let points = 0;
    let clickMultiplier = 1;      // start: +1 per klik
    let hasGoat = false;          // om aksel er købt
    let goatInterval = null;

    // DOM elementer
    const scoreDisplay = document.getElementById('scoreDisplay');
    const clickPowerSpan = document.getElementById('clickPowerSpan');
    const clickLevelSpan = document.getElementById('clickLevel');
    const clickCostSpan = document.getElementById('clickCostSpan');
    const goatCostSpan = document.getElementById('goatCostSpan');
    const buyClickBtn = document.getElementById('buyClickBtn');
    const buyGoatBtn = document.getElementById('buyGoatBtn');
    const resetBtn = document.getElementById('resetBtn');
    const mouthElement = document.getElementById('mouthState');
    const williamArea = document.getElementById('williamClicker');
    const goatWrapperDiv = document.getElementById('goatWrapper');

    // Opdater UI af point og klikkraft
    function updateUI() {
        scoreDisplay.innerText = Math.floor(points);
        clickPowerSpan.innerText = clickMultiplier;
        clickLevelSpan.innerText = clickMultiplier;
        // Opdater knap tilstande
        const clickCost = getClickUpgradeCost();
        clickCostSpan.innerText = clickCost;
        const goatCost = 50;
        goatCostSpan.innerText = goatCost;

        if (points >= clickCost) {
            buyClickBtn.disabled = false;
            buyClickBtn.classList.remove('disabled-btn');
        } else {
            buyClickBtn.disabled = true;
            buyClickBtn.classList.add('disabled-btn');
        }

        if (!hasGoat && points >= goatCost) {
            buyGoatBtn.disabled = false;
            buyGoatBtn.classList.remove('disabled-btn');
        } else if (hasGoat) {
            buyGoatBtn.disabled = true;
            buyGoatBtn.classList.add('disabled-btn');
            buyGoatBtn.innerText = 'AKSEL ✔️';
        } else {
            buyGoatBtn.disabled = true;
            buyGoatBtn.classList.add('disabled-btn');
        }

        if (!hasGoat) {
            buyGoatBtn.innerText = 'KØB';
        } else {
            buyGoatBtn.innerText = '🐐 AKTIVERET';
        }
    }

    // Pris for næste klik-upgrade: basis 10, stiger med 8 per niveau (clickMultiplier)
    function getClickUpgradeCost() {
        let base = 10;
        let increase = (clickMultiplier - 1) * 8;
        return base + increase;
    }

    // Læg point til (kan komme fra klik eller goat)
    function addPoints(amount) {
        points += amount;
        if (points < 0) points = 0;
        updateUI();
        // Tjek goat animation (hvis goat ejes, skal den være synlig)
        syncGoatVisual();
    }

    // mund-animation: åben/luk ved klik (hurtig)
    let mouthTimeout = null;
    function animateMouth() {
        if (mouthTimeout) clearTimeout(mouthTimeout);
        mouthElement.classList.remove('mouth-closed');
        mouthElement.classList.add('mouth-open');
        // skift til open svg
        mouthElement.style.content = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 50\"><path fill=\"%23442211\" stroke=\"%23b97f44\" stroke-width=\"2\" d=\"M20,15 Q50,45 80,15 Q65,30 35,30 Q20,28 20,15Z\" /></svg>')";
        mouthTimeout = setTimeout(() => {
            if (mouthElement) {
                mouthElement.classList.remove('mouth-open');
                mouthElement.classList.add('mouth-closed');
                mouthElement.style.content = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 30\"><path fill=\"%238B5A2B\" stroke=\"%23c28544\" stroke-width=\"2.2\" d=\"M25,18 Q50,8 75,18 Q55,12 45,12 Q30,14 25,18Z\" /></svg>')";
            }
        }, 180);
    }

    // Klik på William
    function onClickWilliam() {
        let gain = clickMultiplier;
        addPoints(gain);
        // Mund åbner og lukker
        animateMouth();
        // Ekstra visuel feed-back: kort skaler (CSS gør det meste)
        const img = document.querySelector('.william-base');
        if (img) {
            img.style.transform = 'scale(0.98)';
            setTimeout(() => { if(img) img.style.transform = ''; }, 100);
        }
    }

    // Køb klik-upgrade
    function buyClickUpgrade() {
        let cost = getClickUpgradeCost();
        if (points >= cost) {
            points -= cost;
            clickMultiplier++;
            updateUI();
        } else {
            // utilstrækkeligt
        }
    }

    // Køb Aksel the goat (passiv indkomst)
    function buyGoatUpgrade() {
        if (hasGoat) return;
        let cost = 50;
        if (points >= cost) {
            points -= cost;
            hasGoat = true;
            // start interval: giver +1 hvert sekund
            if (goatInterval) clearInterval(goatInterval);
            goatInterval = setInterval(() => {
                if (hasGoat) {
                    addPoints(1);
                    // lille visuel blink på goat
                    const goatImg = document.querySelector('.goat-img');
                    if (goatImg) {
                        goatImg.style.filter = 'drop-shadow(0 0 4px gold)';
                        setTimeout(() => { if(goatImg) goatImg.style.filter = ''; }, 150);
                    }
                }
            }, 1000);
            syncGoatVisual();
            updateUI();
        }
    }

    // Synkroniser goat synlighed (går rundt om William)
    function syncGoatVisual() {
        if (hasGoat) {
            goatWrapperDiv.style.display = 'block';
            // Sørg for at billedet er korrekt, og animation kører
            const existingGoatImg = document.getElementById('akselGoatImg');
            if (existingGoatImg) {
                // Billedet er allerede sat
            }
        } else {
            goatWrapperDiv.style.display = 'none';
        }
    }

    // Nulstil spil
    function resetGame() {
        points = 0;
        clickMultiplier = 1;
        if (hasGoat) {
            if (goatInterval) clearInterval(goatInterval);
            goatInterval = null;
            hasGoat = false;
        }
        // stop evt interval helt
        if (goatInterval) clearInterval(goatInterval);
        goatInterval = null;
        hasGoat = false;
        updateUI();
        syncGoatVisual();
        // mund tilbage til lukket
        mouthElement.classList.remove('mouth-open');
        mouthElement.classList.add('mouth-closed');
        mouthElement.style.content = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 30\"><path fill=\"%238B5A2B\" stroke=\"%23c28544\" stroke-width=\"2.2\" d=\"M25,18 Q50,8 75,18 Q55,12 45,12 Q30,14 25,18Z\" /></svg>')";
        // Ryd evt timers
        if (mouthTimeout) clearTimeout(mouthTimeout);
    }

    // Event listeners
    williamArea.addEventListener('click', onClickWilliam);
    buyClickBtn.addEventListener('click', buyClickUpgrade);
    buyGoatBtn.addEventListener('click', buyGoatUpgrade);
    resetBtn.addEventListener('click', resetGame);

    // Initial opdatering og goat synlig
    updateUI();
    syncGoatVisual();
    // For at undgå at billedet af goat fejler hvis allerede købt? nej start uden goat
    // Hvis man har goat fra start? nej.
    // Ekstra: sikre at hvis goat købes, interval startes korrekt.
    // Hvis reset kaldes, sikre goat interval stoppes
    window.addEventListener('load', () => {
        // Hvis noget persistens kunne være her, men vi starter fra 0
        resetGame(); // starter clean
        updateUI();
        syncGoatVisual();
        // sæt standard mund-lukket css
        mouthElement.style.content = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 30\"><path fill=\"%238B5A2B\" stroke=\"%23c28544\" stroke-width=\"2.2\" d=\"M25,18 Q50,8 75,18 Q55,12 45,12 Q30,14 25,18Z\" /></svg>')";
    });

    // Husk at opdatere priser hvis point ændres (updateUI klarer det)
    // Forbedring: Tilføj goat orbit start når goat købes. animationen kører altid i CSS når wrapper er synlig.
    // Fix goat wrapper start: sikre at ved goat køb, animation kører flot.
    // Mund-animation ved klik: er allerede implementeret.
    // Derudover hvis man klikker hurtigt, lukker den korrekt efter 180ms.
    // Gør det umuligt at købe goat to gange
    // Eventuel præcisering: aksel giver 1 click hvert sekund = 1 point hvert sekund, uanset clickMultiplier.
    // Men det er i tråd med "giver 1 click hvert sekund". Super!
    // Lav ekstra sikkerhed så goat interval ikke dobbelt-startes
    const originalBuyGoat = buyGoatUpgrade;
    window.buyGoatUpgrade = buyGoatUpgrade;
    // done
</script>
</body>
</html>

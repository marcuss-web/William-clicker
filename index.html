<!DOCTYPE html>
<html>
<head>
    <title>JS TEST</title>
</head>
<body>
    <h1>JavaScript Test</h1>
    <button id="testBtn">KLIK MIG</button>
    <div id="result">Intet endnu</div>

    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            document.getElementById('result').innerHTML = 'KNAPPEN VIRKER! ' + new Date();
        });
        
        // Test om script kører
        document.getElementById('result').innerHTML = 'Script loaded!';
    </script>
</body>
</html>
